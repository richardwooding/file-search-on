name: Fuzz

# Native Go fuzzing — go.dev/doc/security/fuzz — discovers panics
# and timeouts in parsers (frontmatter, MP3 headers, EBML, MP4
# boxes, office/EPUB body extractors, email MIME body extractor,
# CEL expressions, gob decoder) by mutating seed corpora.
#
# This workflow runs each target for a few minutes nightly. Found
# crashes land in testdata/fuzz/<FuzzName>/ inside the failed run's
# artifacts; commit those entries to lock in regression coverage.
#
# Regular CI (ci.yml) automatically executes the seed corpus for
# every fuzz target on every push — that catches the basics. This
# workflow is the proactive bug-hunt that fires when nobody is
# watching.
on:
  schedule:
    # 03:30 UTC daily. Off-hours so it doesn't compete with the
    # main CI runners.
    - cron: "30 3 * * *"
  workflow_dispatch:
    # Manual trigger from the Actions tab — useful when adding a
    # new fuzz target or after touching a parser.
    inputs:
      fuzztime:
        description: "Duration per target (e.g. 60s, 5m, 30m)"
        default: "5m"
        required: false

jobs:
  fuzz:
    name: ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      # One job per target so crashes in one don't mask others, and
      # so the matrix view in the Actions UI shows per-target status.
      fail-fast: false
      matrix:
        target:
          - name: SplitFrontmatter
            pkg: ./internal/content/
            func: FuzzSplitFrontmatter
          - name: ReadMP3Info
            pkg: ./internal/content/
            func: FuzzReadMP3Info
          - name: ReadMKVInfo
            pkg: ./internal/content/
            func: FuzzReadMKVInfo
          - name: ReadMP4VideoInfo
            pkg: ./internal/content/
            func: FuzzReadMP4VideoInfo
          - name: ExtractXMLText
            pkg: ./internal/content/
            func: FuzzExtractXMLText
          - name: ExtractHTMLText
            pkg: ./internal/content/
            func: FuzzExtractHTMLText
          - name: ExtractEmailBody
            pkg: ./internal/content/
            func: FuzzExtractEmailBody
          - name: ExtractPDFBody
            pkg: ./internal/content/
            func: FuzzExtractPDFBody
          - name: ReadDMGTrailer
            pkg: ./internal/content/
            func: FuzzReadDMGTrailer
          - name: ReadQCOW2Header
            pkg: ./internal/content/
            func: FuzzReadQCOW2Header
          - name: ReadVHDXMetadata
            pkg: ./internal/content/
            func: FuzzReadVHDXMetadata
          - name: ParseClassFile
            pkg: ./internal/content/
            func: FuzzParseClassFile
          - name: ParsePYCHeader
            pkg: ./internal/content/
            func: FuzzParsePYCHeader
          - name: ParseWASMModule
            pkg: ./internal/content/
            func: FuzzParseWASMModule
          - name: ParseFITSHeaders
            pkg: ./internal/content/
            func: FuzzParseFITSHeaders
          - name: ParseVOTable
            pkg: ./internal/content/
            func: FuzzParseVOTable
          - name: ParseHDF5Superblock
            pkg: ./internal/content/
            func: FuzzParseHDF5Superblock
          - name: ParsePDS3Label
            pkg: ./internal/content/
            func: FuzzParsePDS3Label
          - name: ParsePDS4Label
            pkg: ./internal/content/
            func: FuzzParsePDS4Label
          - name: ParseCDFHeader
            pkg: ./internal/content/
            func: FuzzParseCDFHeader
          - name: ParseSQLiteHeader
            pkg: ./internal/content/
            func: FuzzParseSQLiteHeader
          - name: ParseWALHeader
            pkg: ./internal/content/
            func: FuzzParseWALHeader
          - name: ParsePlist
            pkg: ./internal/content/
            func: FuzzParsePlist
          - name: CELCompile
            pkg: ./internal/celexpr/
            func: FuzzCELCompile
          - name: DecodeEntry
            pkg: ./internal/index/
            func: FuzzDecodeEntry
          - name: DecodeBody
            pkg: ./internal/index/
            func: FuzzDecodeBody
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: true
      - name: Fuzz ${{ matrix.target.name }}
        run: |
          go test \
            -run='^$' \
            -fuzz=${{ matrix.target.func }} \
            -fuzztime=${{ github.event.inputs.fuzztime || '5m' }} \
            ${{ matrix.target.pkg }}
      - name: Upload crash corpus on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          # Go writes failing seeds to testdata/fuzz/<FuzzName>/.
          # Capture the whole testdata tree so we don't have to
          # second-guess the layout.
          name: fuzz-corpus-${{ matrix.target.name }}
          path: |
            **/testdata/fuzz/${{ matrix.target.func }}/
          if-no-files-found: ignore
          retention-days: 30
