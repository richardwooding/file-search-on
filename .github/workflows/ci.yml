name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Verify go fix is clean
        run: |
          go fix ./...
          git diff --exit-code
      - name: Test
        # -timeout 180s caps individual test functions at 3 minutes — long
        # enough for the slowest fuzz-seed sweeps + race-detector overhead,
        # short enough that a hung test dumps goroutines and fails the
        # build within minutes instead of waiting out the default 10m.
        run: go test -race -timeout 180s -coverprofile=coverage.out ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
