version: 2

project_name: file-search-on

before:
  hooks:
    - go mod tidy

builds:
  - id: file-search-on
    main: ./cmd/file-search-on
    binary: file-search-on
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    # Embed only the tree-sitter grammars used for symbol extraction
    # (internal/content/source_symbols_treesitter.go). Without these tags
    # the gotreesitter `grammars` package embeds all ~206 grammars
    # (~+22 MB); the subset keeps the binary delta to ~+11 MB. Keep in
    # sync with the language set in source_symbols_treesitter.go.
    tags:
      - grammar_subset
      - grammar_subset_rust
      - grammar_subset_typescript
      - grammar_subset_javascript
      - grammar_subset_ruby
      - grammar_subset_swift
      - grammar_subset_kotlin
      - grammar_subset_c
      - grammar_subset_cpp
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    ids: [file-search-on]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      # macOS Vision OCR helper (issue #189) — bundled in every
      # archive, used only on darwin. The ~70KB cost is trivial vs.
      # the workflow complexity of per-OS archive splitting. The Go
      # binary's helper-locator (sibling to os.Executable()) finds
      # it; on non-darwin builds the helper is never invoked because
      # no OCR provider registers.
      - src: dist-extra/file-search-on-ocr-helper
        dst: file-search-on-ocr-helper

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?!?:'
      order: 0
    - title: Bug fixes
      regexp: '^fix(\(.+\))?!?:'
      order: 1
    - title: Others
      order: 999

kos:
  - id: file-search-on
    build: file-search-on
    repositories:
      - ghcr.io/richardwooding/file-search-on
    base_image: cgr.dev/chainguard/static
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{.Version}}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    sbom: spdx
    bare: true
    preserve_import_paths: false
    labels:
      org.opencontainers.image.source: "https://github.com/richardwooding/file-search-on"
      org.opencontainers.image.licenses: "MIT"
      org.opencontainers.image.description: "Content-type aware file search with CEL"
      org.opencontainers.image.version: "{{.Version}}"
      org.opencontainers.image.revision: "{{.Commit}}"

homebrew_casks:
  - name: file-search-on
    binaries:
      - file-search-on
      # OCR helper (issue #189). The Go binary's helper-locator
      # finds it as a sibling of os.Executable() — Homebrew installs
      # both under the same bin/ directory.
      - file-search-on-ocr-helper
    repository:
      owner: richardwooding
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew cask update for {{ .ProjectName }} {{ .Tag }}"
    homepage: "https://github.com/richardwooding/file-search-on"
    description: "Content-type aware file search with CEL attribute filtering"
    # Strip the quarantine xattr from BOTH binaries so macOS Gatekeeper
    # doesn't block them on first run. Both `file-search-on` and the
    # `file-search-on-ocr-helper` it execs are unsigned; without the
    # strip, the helper subprocess fails Gatekeeper's launch check and
    # OCR silently returns empty bodies (best-effort body contract).
    # See issue tracking real signing+notarization for the long-term fix.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/file-search-on"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/file-search-on-ocr-helper"]
          end
    caveats: |
      file-search-on is not yet signed/notarized with an Apple Developer ID.
      The cask removes the quarantine attribute from file-search-on AND
      file-search-on-ocr-helper on install so Gatekeeper lets them run
      (the helper is what powers --ocr; it's spawned as a subprocess
      and inherits the quarantine state from the install tarball). If
      macOS still blocks anything, run:
        sudo xattr -dr com.apple.quarantine $(brew --prefix)/bin/file-search-on
        sudo xattr -dr com.apple.quarantine $(brew --prefix)/bin/file-search-on-ocr-helper
