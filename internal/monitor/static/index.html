<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>file-search-on · monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>file-search-on <span class="muted">monitor</span></h1>
    <div class="hdr-meta">
      <span id="health" class="pill pill-unknown">connecting…</span>
      <span id="hdr-version" class="muted"></span>
      <span id="hdr-mode" class="tag"></span>
      <span id="hdr-uptime" class="muted"></span>
      <div id="peers" class="peers"></div>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>Overview</h2>
      <div id="overview" class="kv-grid"></div>
    </section>

    <section class="panel">
      <h2>Cache</h2>
      <div id="cache" class="cache-grid"></div>
    </section>

    <section class="panel">
      <h2>Cache entries <span id="cb-counts" class="muted"></span></h2>
      <div class="cb-toolbar">
        <div class="cb-tabs">
          <button id="cb-tab-attrs" class="cb-tab cb-tab-active" data-bucket="attrs">Attributes</button>
          <button id="cb-tab-bodies" class="cb-tab" data-bucket="bodies">Bodies</button>
        </div>
        <input id="cb-filter" type="search" placeholder="filter by path substring…" autocomplete="off">
        <div class="cb-pager">
          <button id="cb-prev" class="cb-btn">‹ prev</button>
          <span id="cb-pageinfo" class="muted">—</span>
          <button id="cb-next" class="cb-btn">next ›</button>
        </div>
      </div>
      <div id="cb-table"></div>
    </section>
    <div id="cb-modal" class="cb-modal" hidden>
      <div class="cb-modal-inner">
        <button id="cb-modal-close" class="cb-modal-close" aria-label="Close">×</button>
        <div id="cb-modal-body"></div>
      </div>
    </div>

    <section class="panel">
      <h2>Activity <span id="inflight" class="badge"></span></h2>
      <div id="activity-tools"></div>
      <h3 class="sub">Recent calls</h3>
      <div id="activity-recent" class="feed"></div>
    </section>

    <section class="panel">
      <h2>Capabilities</h2>
      <div id="capabilities"></div>
    </section>
  </main>

  <footer class="muted">polling every 2s · localhost only · read-only</footer>
  <script src="app.js"></script>
</body>
</html>
